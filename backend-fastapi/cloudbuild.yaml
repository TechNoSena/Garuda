steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend-fastapi'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/garuda-backend:$COMMIT_SHA', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend-fastapi'
    args: ['push', 'gcr.io/$PROJECT_ID/garuda-backend:$COMMIT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'backend-fastapi'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'garuda-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/garuda-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/garuda-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

name: garuda_app
description: "Project Garuda — Autonomous Supply Chain Routing Engine"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  shared_preferences: ^2.5.3
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_client_sse: ^2.0.3
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_polyline_points: ^3.1.0
  flutter_overlay_window: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - garuda_logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "garuda_logo.png"
  min_sdk_size: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "garuda_logo.png"
